<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>情報リテラシー・カードバトル</title>
<style>
/* ===== RESET ===== */
* { box-sizing: border-box; user-select: none; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  background: #050508;
  color: #1a1a1c;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
  overflow: hidden;
}

/* ===== THEME ===== */
:root {
  --accent: #e63946;
  --accent-rgb: 230, 57, 70;
  --danger: #2563eb;
  --danger-rgb: 37, 99, 235;
}

/* ===== LAYOUT ===== */
#game-container {
  position: relative;
  width: 100%;
  height: 100%;
  max-width: 760px;
  max-height: 680px;
  display: flex;
  flex-direction: column;
  padding: clamp(10px, 2vw, 20px);
  gap: clamp(8px, 1.5vh, 14px);
  overflow: hidden;
}

/* ===== PANEL BASE ===== */
.panel {
  background: rgba(255, 255, 255, 0.93);
  border: 1px solid rgba(0, 0, 0, 0.12);
  border-radius: 16px;
}

/* ===== BATTLE STATUS ===== */
.battle-status {
  position: relative;
  flex: 1 1 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: clamp(6px, 1.2vh, 12px);
  padding: clamp(12px, 2vh, 18px) clamp(16px, 3vw, 28px);
  overflow: hidden;
}
.player-status {
  flex: 0 0 auto;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: clamp(10px, 1.6vh, 14px) clamp(16px, 3vw, 28px);
}
.hp-row {
  width: 100%;
  max-width: 420px;
  display: flex;
  flex-direction: column;
  gap: 4px;
}
.hp-row-top {
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.hp-label {
  font-size: clamp(11px, 1.6vw, 13px);
  font-weight: 900;
  letter-spacing: 0.1em;
  color: #444;
}
.hp-value {
  font-size: clamp(16px, 2.6vw, 20px);
  font-weight: 900;
  color: #1a1a1c;
  transition: color 0.2s ease;
}
.hp-row.is-low .hp-value { color: var(--accent); }
.hp-bar-row {
  display: flex;
  align-items: center;
  gap: 6px;
  width: 100%;
}
.hp-bar-label {
  font-size: clamp(10px, 1.4vw, 12px);
  font-weight: 900;
  color: #444;
  flex-shrink: 0;
}
.hp-bar-track {
  flex: 1 1 auto;
  height: 12px;
  border-radius: 6px;
  background: rgba(0, 0, 0, 0.18);
  overflow: hidden;
}
.hp-bar-fill {
  height: 100%;
  width: 100%;
  background: var(--accent);
  transition: width 0.3s ease;
}

.enemy-display {
  flex: 1 1 auto;
  width: 100%;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
}
.enemy-display.is-hit { animation-name: enemyHit; animation-timing-function: ease; }
.enemy-figure {
  width: auto;
  height: 100%;
  max-width: 100%;
  display: block;
}
.enemy-image {
  width: auto;
  height: 100%;
  max-width: 100%;
  object-fit: contain;
  display: block;
}
.ef-body { fill: #15151a; stroke: #f59e0b; stroke-width: 4; }
.ef-spike { stroke: #f59e0b; stroke-width: 4; stroke-linecap: round; }
.ef-eye { fill: #f59e0b; }
@keyframes enemyHit {
  0%, 100% { transform: translateX(0) rotate(0); }
  30% { transform: translateX(-6px) rotate(-4deg); }
  60% { transform: translateX(6px) rotate(4deg); }
}

#game-container.is-shaking { animation-name: screenShake; animation-timing-function: ease; }
@keyframes screenShake {
  0%, 100% { transform: translate(0, 0); }
  20% { transform: translate(-7px, 3px); }
  40% { transform: translate(6px, -4px); }
  60% { transform: translate(-5px, 4px); }
  80% { transform: translate(4px, -2px); }
}

/* ===== HAND / CARD ===== */
.hand-area {
  flex: 0 0 auto;
  display: flex;
  justify-content: center;
  align-items: stretch;
  gap: clamp(8px, 2vw, 16px);
  flex-wrap: wrap;
}
.battle-card {
  width: clamp(108px, 30%, 190px);
  min-height: clamp(168px, 40vh, 226px);
  display: flex;
  flex-direction: column;
  padding: clamp(8px, 1.4vw, 12px);
  border-width: 4px;
  border-color: var(--card-color, #2a2a2e);
  cursor: pointer;
  transition: transform 0.15s ease;
}
.battle-card:hover {
  transform: translateY(-8px);
}
.card-level {
  font-size: clamp(11px, 1.5vw, 13px);
  font-weight: 900;
  letter-spacing: 1px;
  color: var(--card-color, #2a2a2e);
  text-align: center;
  margin-bottom: 4px;
}
.card-name {
  font-size: clamp(11px, 1.6vw, 13px);
  font-weight: 900;
  line-height: 1.3;
  color: #1a1a1c;
  text-align: center;
  min-height: 2.6em;
  margin-bottom: 6px;
}
.card-desc {
  font-size: clamp(9px, 1.25vw, 11px);
  line-height: 1.4;
  color: #222;
  flex: 1;
  display: -webkit-box;
  -webkit-line-clamp: 3;
  -webkit-box-orient: vertical;
  overflow: hidden;
}
.card-foot {
  display: flex;
  justify-content: space-between;
  align-items: baseline;
  border-top: 1px solid rgba(0, 0, 0, 0.12);
  padding-top: 4px;
  margin-top: 4px;
}
.card-atk { font-size: clamp(11px, 1.6vw, 13px); font-weight: 900; color: #1a1a1c; }
.card-attr { font-size: clamp(9px, 1.2vw, 11px); font-weight: 700; color: #555; }

/* ===== QUIZ ===== */
.quiz-overlay {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s ease;
  z-index: 30;
  padding: clamp(12px, 3vw, 24px);
}
.quiz-overlay.show { opacity: 1; pointer-events: auto; }
.quiz-panel {
  width: 100%;
  max-width: 460px;
  padding: clamp(18px, 3vw, 28px);
  display: flex;
  flex-direction: column;
  gap: 14px;
}
.quiz-question {
  font-size: clamp(13px, 2vw, 16px);
  font-weight: 900;
  line-height: 1.6;
  color: #1a1a1c;
}
.quiz-options { display: flex; flex-direction: column; gap: 10px; }
.quiz-option {
  text-align: left;
  padding: 12px 14px;
  border-radius: 10px;
  border: 2px solid rgba(0, 0, 0, 0.2);
  background: rgba(255, 255, 255, 0.55);
  font-family: inherit;
  font-size: clamp(11px, 1.6vw, 13px);
  font-weight: 700;
  color: #1a1a1c;
  cursor: pointer;
  transition: border-color 0.15s ease, background 0.15s ease;
}
.quiz-option:hover:not(:disabled) { border-color: var(--accent); background: rgba(var(--accent-rgb), 0.12); }
.quiz-option:disabled { cursor: default; }
.quiz-option.is-correct { border-width: 4px; border-color: var(--accent); background: rgba(var(--accent-rgb), 0.18); }
.quiz-option.is-incorrect { border-width: 4px; border-color: var(--danger); background: rgba(var(--danger-rgb), 0.15); }
.quiz-mark { font-weight: 900; margin-right: 6px; }
.quiz-option.is-correct .quiz-mark { color: var(--accent); }
.quiz-option.is-incorrect .quiz-mark { color: var(--danger); }

/* ===== SYMBOL FLASH ===== */
.symbol-flash {
  position: absolute;
  inset: 0;
  background: rgba(0, 0, 0, 0.55);
  backdrop-filter: blur(6px);
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 40;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.15s ease;
  padding: clamp(14px, 3vw, 24px);
  cursor: pointer;
}
.symbol-flash.show { opacity: 1; pointer-events: auto; }
.result-modal {
  width: min(340px, 90%);
  display: flex;
  flex-direction: column;
  border: 6px solid #fff;
  border-radius: 20px;
  overflow: hidden;
}
.result-top {
  background: var(--accent);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(18px, 4vh, 28px) 0;
}
.symbol-flash.is-wrong .result-top { background: var(--danger); }
.symbol-mark {
  font-size: clamp(48px, 13vw, 72px);
  font-weight: 900;
  line-height: 1;
  color: #fff;
  -webkit-text-stroke: 3px #fff;
  paint-order: stroke fill;
}
.result-bottom {
  background: #fff;
  color: #1a1a1c;
  font-size: clamp(12px, 1.8vw, 14px);
  line-height: 1.8;
  text-align: left;
  padding: clamp(16px, 3vw, 22px);
}

/* ===== SCREENS ===== */
.battle-screen {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  flex-direction: column;
  gap: clamp(8px, 1.5vh, 14px);
}
.screen-wrap {
  flex: 1 1 auto;
  min-height: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: clamp(14px, 3vw, 24px);
}
.info-panel { width: min(480px, 92%); padding: 36px 32px; text-align: center; }
.info-panel h1 {
  font-size: clamp(19px, 3.2vw, 27px);
  font-weight: 900;
  letter-spacing: 0.08em;
  color: #1a1a1c;
  margin-bottom: 14px;
}
.info-panel p {
  font-size: clamp(12px, 1.8vw, 14px);
  line-height: 1.7;
  color: #333;
  margin-bottom: 24px;
}
.panel-title-wrap { display: flex; flex-direction: column; align-items: center; margin-bottom: 18px; }
.panel-title {
  font-size: clamp(17px, 2.6vw, 21px);
  font-weight: 900;
  letter-spacing: 0.12em;
  color: #1a1a1c;
  padding-bottom: 8px;
  border-bottom: 3px solid var(--accent);
}
.panel-subtitle {
  font-size: clamp(11px, 1.6vw, 13px);
  font-weight: 700;
  color: #444;
  line-height: 1.7;
  text-align: center;
  margin-bottom: 24px;
}
.rules-box {
  width: 100%;
  text-align: left;
  font-size: 14px;
  line-height: 1.9;
  color: #222;
  background: rgba(0, 0, 0, 0.03);
  border: 1px solid rgba(0, 0, 0, 0.15);
  border-radius: 10px;
  padding: 18px 22px;
  margin-bottom: 28px;
}
.btn-primary {
  font-family: inherit;
  font-size: 17px;
  font-weight: bold;
  letter-spacing: 0.05em;
  padding: 16px 48px;
  border-radius: 10px;
  border: none;
  background: var(--accent);
  color: #fff;
  cursor: pointer;
  transition: filter 0.15s ease;
}
.btn-primary:hover { filter: brightness(1.08); }
.btn-primary:active { filter: brightness(0.95); }

.hidden { display: none !important; }
</style>
</head>
<body>

<div id="game-container"></div>

<script>
const USER_SETTINGS = {
  PLAYER_MAX_HP: 4000,
  ENEMY_MAX_HP: 6000,
  ENEMY_ATK: 1000,

  /* ===== ENEMY_IMAGE (images/ 配下の相対パスを指定。空文字ならSVGのまま) ===== */
  ENEMY_IMAGE: '',

  HAND_SIZE: 3,
  LOW_HP_THRESHOLD: 0.3,

  /* ===== ATTRIBUTE_COLORS (カード枠・レベル表示の色。DEFAULTは属性未指定時) ===== */
  ATTRIBUTE_COLORS: {
    "光": "#eab308",
    "炎": "#f97316",

    "風": "#16a34a",

  },

  },

    HIT_ANIM_MS: 300,
    SCREEN_SHAKE_MS: 350,
    RESULT_DELAY_MS: 500
  },

  /* ===== CARDS (1枚ごとにカード情報と出題をまとめて1つのオブジェクトで管理。level = ATKの連動元(atkを個別指定した場合はそちらを優先)。1度使用したら再抽選されない。question.options[0] = correct) ===== */
  CARDS: [
    {
      id: "c1", name: "パスワードロック", attr: "地", level: 1, atk: 600,

      question: {

    },
    {

        q: "図書館や学校など共有のパソコンを使い終わったら、まず何をするべき？",

    {

      question: {
        q: "知らない人から「荷物の不在通知」とURLが書かれたSMSが届いた。正しい対応は？",
        options: ["URLはクリックせず、公式アプリ等で配送状況を確認する", "急いでURLをクリックして再配達を依頼する", "送信元に電話をかけて確認する", "自分の個人情報を返信して本人確認する"],

      question: {
        q: "席を離れてトイレに行く間、ノートパソコンの画面はどうするべき？",

        explanation: "画面を開けたまま離れると、誰でも操作できてしまいます。少しの間でも席を離れるときは、必ず画面をロックしましょう。"
      }
    },
    {
      id: "c5", name: "ウイルススキャナー", attr: "光", level: 3, atk: 1200,

      question: {

      }
    },
    {

      question: {
        q: "本物の銀行サイトとよく似た偽サイトを見分けるために最も重要な確認は？",
        options: ["URLのスペルやドメインが正規のものと完全に一致しているか確認する", "サイトのデザインがきれいかどうかで判断する", "鍵マークが表示されていれば無条件に信頼する", "検索結果の上位に出てきたかどうかで判断する"],
        explanation: "デザインや鍵マークだけでは偽サイトを見抜けません。URLのスペルやドメインが正規のものと完全に一致しているかを必ず確認しましょう。"
      }
    }
  ]
};

class CardBattleGame {
  constructor(containerId, settings) {
    this.container = document.getElementById(containerId);
    this.settings = settings;
    this.cardPool = settings.CARDS.map(card => ({
      ...card,
      atk: (typeof card.atk === 'number') ? card.atk : this.getAtkForLevel(card.level)
    }));

    this.playerHp = settings.PLAYER_MAX_HP;
    this.enemyHp = settings.ENEMY_MAX_HP;
    this.deck = [];
    this.hand = [];
    this.score = 0;

    this.currentCard = null;
    this.currentQuestion = null;
    this.pendingCorrect = false;
    this.isGameOver = false;
    this.isClear = false;
    this.isBusy = false;

    this.boundHandleClick = this.handleClick.bind(this);
  }

  getAtkForLevel(level) {
    const b = this.settings.CARD_BALANCE;
    return b.BASE_ATK + (level - 1) * b.ATK_PER_LEVEL;
  }

  // ===== INIT =====
  init() {
    this.renderBaseHTML();
    this.cacheUI();
    this.setupEnemyVisual();
    this.container.addEventListener('click', this.boundHandleClick);
  }

  setupEnemyVisual() {
    const path = this.settings.ENEMY_IMAGE;
    if (!path) return;
    const img = this.ui.enemyImage;
    img.onload = () => {
      this.ui.enemyFigure.classList.add('hidden');
      img.classList.remove('hidden');
    };
    img.onerror = () => {
      img.classList.add('hidden');
      this.ui.enemyFigure.classList.remove('hidden');
    };
    img.src = path;
  }

  cacheUI() {
    this.ui = {
      playerHpRow: this.container.querySelector('#ui-player-hp-row'),
      playerHpText: this.container.querySelector('#ui-player-hp-text'),
      playerHpBar: this.container.querySelector('#ui-player-hp-bar'),
      enemyHpRow: this.container.querySelector('#ui-enemy-hp-row'),
      enemyHpText: this.container.querySelector('#ui-enemy-hp-text'),
      enemyHpBar: this.container.querySelector('#ui-enemy-hp-bar'),
      enemyFigure: this.container.querySelector('#ui-enemy-figure'),
      enemyImage: this.container.querySelector('#ui-enemy-image'),
      enemyDisplay: this.container.querySelector('#ui-enemy-display'),
      handArea: this.container.querySelector('#ui-hand-area'),
      symbolFlash: this.container.querySelector('#ui-symbol-flash'),
      symbolMark: this.container.querySelector('#ui-symbol-mark'),
      resultExplanation: this.container.querySelector('#ui-result-explanation'),
      quizOverlay: this.container.querySelector('#ui-quiz-overlay'),
      quizQuestion: this.container.querySelector('#ui-quiz-question'),
      quizOptions: this.container.querySelector('#ui-quiz-options'),
      startScreen: this.container.querySelector('#screen-start'),
      battleScreen: this.container.querySelector('#screen-battle'),
      resultScreen: this.container.querySelector('#screen-result'),
      resultTitle: this.container.querySelector('#result-title'),
      resultMessage: this.container.querySelector('#result-message')
    };
  }

  renderBaseHTML() {
    this.container.innerHTML = `
      <div class="battle-screen hidden" id="screen-battle">
        <div class="battle-status panel">
          <div class="hp-row" id="ui-enemy-hp-row">
            <div class="hp-row-top">
              <span class="hp-label">CYBER VIRUS</span>
              <span class="hp-value" id="ui-enemy-hp-text"></span>
            </div>
            <div class="hp-bar-row">
              <span class="hp-bar-label">HP</span>
              <div class="hp-bar-track">
                <div class="hp-bar-fill" id="ui-enemy-hp-bar"></div>
              </div>
            </div>
          </div>

          <div class="enemy-display" id="ui-enemy-display">
            <svg viewBox="0 0 100 100" id="ui-enemy-figure" class="enemy-figure">
              <circle class="ef-body" cx="50" cy="50" r="26"></circle>
              <g class="ef-spike">
                <line x1="50" y1="12" x2="50" y2="24"></line>
                <line x1="50" y1="76" x2="50" y2="88"></line>
                <line x1="12" y1="50" x2="24" y2="50"></line>
                <line x1="76" y1="50" x2="88" y2="50"></line>
                <line x1="24" y1="24" x2="32" y2="32"></line>
                <line x1="76" y1="24" x2="68" y2="32"></line>
                <line x1="24" y1="76" x2="32" y2="68"></line>
                <line x1="76" y1="76" x2="68" y2="68"></line>
              </g>
              <circle class="ef-eye" cx="40" cy="47" r="5"></circle>
              <circle class="ef-eye" cx="60" cy="47" r="5"></circle>
            </svg>
            <img class="enemy-image hidden" id="ui-enemy-image" alt="">
          </div>
        </div>

        <div class="hand-area" id="ui-hand-area"></div>

        <div class="player-status panel">
          <div class="hp-row" id="ui-player-hp-row">
            <div class="hp-row-top">
              <span class="hp-label">あなた</span>
              <span class="hp-value" id="ui-player-hp-text"></span>
            </div>
            <div class="hp-bar-row">
              <span class="hp-bar-label">HP</span>
              <div class="hp-bar-track">
                <div class="hp-bar-fill" id="ui-player-hp-bar"></div>
              </div>
            </div>
          </div>
        </div>
      </div>

      <div class="symbol-flash" id="ui-symbol-flash" data-action="dismiss-result">
        <div class="result-modal">
          <div class="result-top"><span class="symbol-mark" id="ui-symbol-mark"></span></div>
          <div class="result-bottom" id="ui-result-explanation"></div>
        </div>
      </div>

      <div class="quiz-overlay" id="ui-quiz-overlay">
        <div class="quiz-panel panel">
          <div class="quiz-question" id="ui-quiz-question"></div>
          <div class="quiz-options" id="ui-quiz-options"></div>
        </div>
      </div>

      <div class="screen-wrap" id="screen-start">
        <div class="info-panel panel">
          <div class="panel-title-wrap">
            <div class="panel-title">情報リテラシー・カードバトル</div>
          </div>
          <div class="panel-subtitle">知識のカードでウイルスを撃退しよう</div>
          <div class="rules-box">
            ルール<br>
            ・手札のカードを1枚選んで出題に答える。<br>
            ・正解すると、カードのATK分だけ敵にダメージを与える。<br>
            ・不正解だと、敵から反撃を受けてしまう。<br>
            ・★が多いカードほど攻撃力は高いが、問題も難しくなる。<br>
            ・敵のHPを0にすればクリア。
          </div>
          <button class="btn-primary" data-action="start">バトルスタート</button>
        </div>
      </div>

      <div class="screen-wrap hidden" id="screen-result">
        <div class="info-panel panel">
          <h1 id="result-title"></h1>
          <p id="result-message"></p>
          <button class="btn-primary" data-action="finish">システムからログアウト</button>
        </div>
      </div>
    `;
  }

  handleClick(e) {
    const target = e.target.closest('[data-action]');
    if (!target) return;
    const action = target.getAttribute('data-action');

    if (action === 'start') {
      this.startGame();
    } else if (action === 'finish') {
      this.finishGame();
    } else if (action === 'play-card' && !this.isGameOver && !this.isBusy) {
      const index = target.getAttribute('data-index');
      this.playCard(parseInt(index, 10));
    } else if (action === 'answer-quiz' && !target.disabled) {
      const isCorrect = target.getAttribute('data-correct') === 'true';
      this.handleAnswer(isCorrect, target);
    } else if (action === 'dismiss-result') {
      this.dismissResult();
    }
  }

  startGame() {
    this.ui.startScreen.classList.add('hidden');
    this.ui.battleScreen.classList.remove('hidden');
    this.initDeck();
    this.drawHand();
    this.updateHpUI();
  }

  // ===== DECK / HAND =====
  initDeck() {
    this.deck = this.shuffleArray(this.cardPool);
  }

  drawHand() {
    this.hand = [];
    for (let i = 0; i < this.settings.HAND_SIZE; i++) {
      if (this.deck.length === 0) break;
      this.hand.push(this.deck.pop());
    }
    this.renderHand();
  }

  renderHand() {
    this.ui.handArea.innerHTML = '';
    this.hand.forEach((card, index) => {
      const cardColor = this.getCardColor(card.attr);
      const attrLabel = card.attr || '-';
      const cardHTML = `
        <div class="battle-card panel" data-action="play-card" data-index="${index}" style="--card-color: ${cardColor};">
          <div class="card-level">${'★'.repeat(card.level)}</div>
          <div class="card-name">${card.name}</div>
          <div class="card-desc" title="${card.desc}">${card.desc}</div>
          <div class="card-foot">
            <div class="card-atk">ATK ${card.atk}</div>
            <div class="card-attr">属性：${attrLabel}</div>
          </div>
        </div>
      `;
      this.ui.handArea.insertAdjacentHTML('beforeend', cardHTML);
    });
  }

  getCardColor(attr) {
    const colors = this.settings.ATTRIBUTE_COLORS;
    return (attr && colors[attr]) ? colors[attr] : colors.DEFAULT;
  }

  playCard(handIndex) {
    this.isBusy = true;
    this.currentCard = this.hand[handIndex];
    this.hand.splice(handIndex, 1);
    if (this.deck.length > 0) {
      this.hand.splice(handIndex, 0, this.deck.pop());
    }
    this.renderHand();

    this.showQuiz(this.currentCard);
  }

  // ===== QUIZ FLOW =====
  showQuiz(card) {
    const qData = card.question;
    this.currentQuestion = qData;

    this.ui.quizQuestion.textContent = qData.q;

    const optionsWithMeta = qData.options.map((text, idx) => ({
      text: text,
      isCorrect: idx === 0
    }));
    const shuffledOptions = this.shuffleArray(optionsWithMeta);

    this.ui.quizOptions.innerHTML = '';
    shuffledOptions.forEach(opt => {
      const btn = document.createElement('button');
      btn.className = 'quiz-option';
      btn.textContent = opt.text;
      btn.setAttribute('data-action', 'answer-quiz');
      btn.setAttribute('data-correct', opt.isCorrect);
      this.ui.quizOptions.appendChild(btn);
    });

    this.ui.quizOverlay.classList.add('show');
  }

  handleAnswer(isCorrect, btnEl) {
    const buttons = this.ui.quizOptions.querySelectorAll('.quiz-option');
    buttons.forEach(b => b.disabled = true);

    btnEl.classList.add(isCorrect ? 'is-correct' : 'is-incorrect');
    btnEl.insertAdjacentHTML('afterbegin', `<span class="quiz-mark">${isCorrect ? '○' : '×'}</span>`);

    setTimeout(() => {
      this.ui.quizOverlay.classList.remove('show');
      this.resolveAction(isCorrect);
    }, this.settings.TIMING.ANSWER_FEEDBACK_MS);
  }

  // ===== BATTLE RESOLUTION =====
  resolveAction(isCorrect) {
    this.pendingCorrect = isCorrect;
    this.showSymbolFlash(isCorrect);
  }

  showSymbolFlash(isCorrect) {
    this.ui.symbolMark.textContent = isCorrect ? '○' : '✕';
    this.ui.resultExplanation.textContent = this.currentQuestion.explanation;
    this.ui.symbolFlash.className = `symbol-flash show ${isCorrect ? '' : 'is-wrong'}`.trim();
  }

  dismissResult() {
    if (!this.ui.symbolFlash.classList.contains('show')) return;
    this.ui.symbolFlash.classList.remove('show');

    const isCorrect = this.pendingCorrect;
    if (isCorrect) {
      this.score += this.currentCard.atk;
      this.enemyHp = Math.max(0, this.enemyHp - this.currentCard.atk);
      this.playHitAnim(this.ui.enemyDisplay);
    } else {
      this.playerHp = Math.max(0, this.playerHp - this.settings.ENEMY_ATK);
      this.playScreenShake();
    }
    this.updateHpUI();
    this.isBusy = false;
    this.checkWinLose();
  }

  playHitAnim(el) {
    el.style.animationDuration = `${this.settings.TIMING.HIT_ANIM_MS}ms`;
    el.classList.add('is-hit');
    setTimeout(() => el.classList.remove('is-hit'), this.settings.TIMING.HIT_ANIM_MS);
  }

  playScreenShake() {
    this.container.style.animationDuration = `${this.settings.TIMING.SCREEN_SHAKE_MS}ms`;
    this.container.classList.add('is-shaking');
    setTimeout(() => this.container.classList.remove('is-shaking'), this.settings.TIMING.SCREEN_SHAKE_MS);
  }

  // ===== UI UPDATE =====
  updateHpUI() {
    const enemyRatio = this.enemyHp / this.settings.ENEMY_MAX_HP;
    this.ui.enemyHpText.textContent = `${this.enemyHp} / ${this.settings.ENEMY_MAX_HP}`;
    this.ui.enemyHpBar.style.width = `${Math.max(0, enemyRatio) * 100}%`;
    this.ui.enemyHpRow.classList.toggle('is-low', enemyRatio <= this.settings.LOW_HP_THRESHOLD);

    const playerRatio = this.playerHp / this.settings.PLAYER_MAX_HP;
    this.ui.playerHpText.textContent = `${this.playerHp} / ${this.settings.PLAYER_MAX_HP}`;
    this.ui.playerHpBar.style.width = `${Math.max(0, playerRatio) * 100}%`;
    this.ui.playerHpRow.classList.toggle('is-low', playerRatio <= this.settings.LOW_HP_THRESHOLD);
  }

  shuffleArray(array) {
    const arr = [...array];
    for (let i = arr.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
    return arr;
  }

  // ===== GAME END =====
  checkWinLose() {
    if (this.enemyHp <= 0) {
      this.endGame(true, "ウイルスを完全に駆除した！");
    } else if (this.playerHp <= 0) {
      this.endGame(false, "システムが乗っ取られました...");
    }
  }

  endGame(isClear, reasonMsg) {
    this.isClear = isClear;
    this.isGameOver = true;
    if (isClear) this.score += this.playerHp;

    setTimeout(() => {
      this.ui.resultTitle.textContent = isClear ? "SYSTEM CLEAR" : "SYSTEM DOWN";
      this.ui.resultTitle.style.color = isClear ? "var(--accent)" : "var(--danger)";
      this.ui.resultMessage.innerHTML = `${reasonMsg}<br><br>BATTLE SCORE: ${this.score}`;
      this.ui.battleScreen.classList.add('hidden');
      this.ui.resultScreen.classList.remove('hidden');
    }, this.settings.TIMING.RESULT_DELAY_MS);
  }

  finishGame() {
    window.parent.postMessage({
      type: 'MINIGAME_END',
      flags: {
        minigame_score: this.score,
        minigame_clear: this.isClear
      }
    }, '*');

    this.destroy();
  }

  destroy() {
    this.container.removeEventListener('click', this.boundHandleClick);
    this.container.innerHTML = '';
  }
}

document.addEventListener('DOMContentLoaded', () => {
  const game = new CardBattleGame('game-container', USER_SETTINGS);
  game.init();
});
</script>
</body>
</html>
