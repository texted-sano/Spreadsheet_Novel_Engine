<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>個人情報クイズ</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #f4f7f6; 
    color: #333; font-family: 'Hiragino Kaku Gothic Pro', 'Noto Sans JP', sans-serif;
    user-select: none; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    height: 100vh; gap: 0;
  }

  #start-screen, #game-screen, #end-screen {
    display: flex; flex-direction: column; align-items: center;
    width: 100%; max-width: 560px; padding: 24px;
  }
  .hidden { display: none !important; }

  /* ヘッダー */
  .title { font-size: 26px; font-weight: bold; color: #2c3e50; margin-bottom: 6px; }
  .subtitle { font-size: 14px; color: #666; margin-bottom: 24px; text-align: center; line-height: 1.6; }

  /* プログレスバー */
  #progress-wrap { width: 100%; margin-bottom: 10px; }
  #progress-label { font-size: 14px; font-weight: bold; color: #555; margin-bottom: 6px; display: flex; justify-content: space-between; }
  #progress-bar-bg { width: 100%; height: 8px; background: #e2e8f0; border-radius: 4px; overflow: hidden; }
  #progress-bar { height: 100%; background: #3498db; width: 0%; transition: width 0.4s ease; }

  /* スコア */
  #score-display { font-size: 14px; color: #e67e22; margin-bottom: 18px; font-weight: bold; }

  /* カード */
  #card-wrap { width: 100%; margin-bottom: 24px; min-height: 110px; }
  #card {
    width: 100%; min-height: 120px; padding: 24px 28px;
    background: #fff; border: 2px solid #e2e8f0;
    border-radius: 12px; display: flex; align-items: center; justify-content: center;
    text-align: center; font-size: 20px; font-weight: bold; color: #333; line-height: 1.5;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    transition: border-color 0.25s, background 0.25s, transform 0.3s, opacity 0.3s;
  }
  #card.slide-in  { animation: slideIn 0.35s ease forwards; }
  #card.correct   { border-color: #4caf50; background: #e8f5e9; }
  #card.wrong     { border-color: #f44336; background: #ffebee; }
  @keyframes slideIn { from { opacity:0; transform:translateX(30px); } to { opacity:1; transform:translateX(0); } }

  /* ボタン */
  #btn-area { display: flex; gap: 20px; margin-bottom: 20px; }
  .ans-btn {
    width: 160px; height: 60px; font-size: 18px; font-weight: bold;
    border: none; border-radius: 8px; cursor: pointer; transition: 0.2s;
  }
  .ans-btn:hover:not(:disabled) { filter: brightness(0.9); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
  .ans-btn:active:not(:disabled) { transform: scale(0.96); }
  .ans-btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; box-shadow: none; }
  
  #btn-ok { background: #4caf50; color: #fff; }
  #btn-ng { background: #e53935; color: #fff; }

  /* フィードバック */
  #feedback-text {
    min-height: 52px; font-size: 14px; font-weight: bold; color: #666; text-align: center;
    line-height: 1.6; background: #fff; border: 2px solid #e2e8f0; border-radius: 8px;
    padding: 12px 16px; width: 100%; transition: opacity 0.3s;
    box-shadow: 0 2px 5px rgba(0,0,0,0.02);
  }
  #feedback-text.correct-fb { color: #2e7d32; border-color: #a5d6a7; background: #f1f8e9; }
  #feedback-text.wrong-fb   { color: #c62828; border-color: #ef9a9a; background: #ffebee; }

  /* フィードバックアイコン */
  #feedback-icon {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    font-size: 80px; pointer-events: none; opacity: 0; transition: opacity 0.2s;
  }
  #feedback-icon.show { opacity: 1; animation: popIcon 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards; }
  @keyframes popIcon { 0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; } 100% { transform: translate(-50%, -50%) scale(1); opacity: 1; } }

  /* エンドスクリーン */
  #end-screen { gap: 0; }
  #end-title { font-size: 28px; font-weight: bold; color: #2c3e50; margin-bottom: 4px; }
  #end-score { font-size: 64px; font-weight: bold; color: #3498db; margin: 12px 0 6px; }
  #end-rank  { font-size: 20px; font-weight: bold; color: #e67e22; margin-bottom: 14px; }
  #end-msg   { font-size: 15px; color: #555; text-align: center; line-height: 1.7; margin-bottom: 28px; }
  #end-btn {
    padding: 16px 48px; font-size: 18px; font-weight: bold;
    background: #3498db; border: none; color: #fff; cursor: pointer; border-radius: 8px; transition: 0.2s;
  }
  #end-btn:hover { background: #2980b9; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

  /* スタート画面 */
  #start-screen .rules {
    font-size: 15px; color: #444; line-height: 1.8; text-align: left;
    background: #fff; border: 2px solid #e2e8f0; border-radius: 10px; padding: 20px 24px;
    width: 100%; margin-bottom: 28px; box-shadow: 0 4px 10px rgba(0,0,0,0.03);
  }
  #start-btn {
    padding: 16px 56px; font-size: 20px; font-weight: bold;
    background: #3498db; border: none; color: #fff; cursor: pointer; border-radius: 8px; transition: 0.2s;
  }
  #start-btn:hover { background: #2980b9; transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }

</style>
</head>
<body>

<!-- スタート画面 -->
<div id="start-screen">
  <div class="title">🔍 個人情報クイズ！</div>
  <div class="subtitle">ネットに「載せていい情報」と「ダメな情報」を見わけよう！</div>
  <div class="rules">
    📋 <strong>ルール</strong><br>
    ・全部で <strong>10問</strong>。1問10点、合計100点満点。<br>
    ・「○ 載せていい」か「✕ ダメ！」をクリック！<br>
    ・<strong>70点以上</strong>でクリア！<br>
    ・正解すると理由も教えてくれるよ！
  </div>
  <button id="start-btn">クイズスタート！</button>
</div>

<!-- ゲーム画面 -->
<div id="game-screen" class="hidden">
  <div class="title">🔍 個人情報クイズ！</div>

  <div id="progress-wrap">
    <div id="progress-label">
      <span>問題 <span id="q-num">1</span> / 10</span>
      <span id="score-display">スコア: <span id="score">0</span> 点</span>
    </div>
    <div id="progress-bar-bg"><div id="progress-bar"></div></div>
  </div>

  <div id="card-wrap">
    <div id="card"><span id="card-text"></span></div>
  </div>

  <div id="btn-area">
    <button class="ans-btn" id="btn-ok">○ 載せていい</button>
    <button class="ans-btn" id="btn-ng">✕ ダメ！</button>
  </div>

  <div id="feedback-text">← ボタンを押してこたえよう！</div>
</div>

<!-- フィードバックアイコン -->
<div id="feedback-icon"></div>

<!-- エンド画面 -->
<div id="end-screen" class="hidden">
  <div id="end-title">クイズ完了！🎉</div>
  <div id="end-score">0 点</div>
  <div id="end-rank"></div>
  <div id="end-msg"></div>
  <button id="end-btn">メインゲームへ戻る</button>
</div>

<script>
// 規約に基づきマジックナンバーを排除
const USER_SETTINGS = {
  PASSING_SCORE: 70,       // 合格点
  TOTAL_QUESTIONS: 10,     // 全問題数
  SCORE_PER_Q: 10,         // 1問あたりのスコア
  DELAY_NEXT_Q: 1600,      // 次の問題へ進む待機時間(ms)
  ICON_SHOW_TIME: 800      // ○×アイコンの表示時間(ms)
};

const QUESTIONS = [
  { text: '🏠　家の住所', safe: false, hint: '❌ ダメ！　住所がバレると知らない人が家に来てしまうかもしれないよ！絶対に書かないで。' },
  { text: '🍣　好きな食べ物', safe: true, hint: '⭕ OK！　好きな食べ物は場所や名前がわからないから大丈夫！' },
  { text: '🏫　学校の名前', safe: false, hint: '❌ ダメ！　学校名がバレると、いつどこにいるかがわかってしまうよ！' },
  { text: '😺　ニックネーム（本名じゃない名前）', safe: true, hint: '⭕ OK！　ニックネームなら本当の名前がわからないから安全！' },
  { text: '📛　本名（フルネーム）', safe: false, hint: '❌ ダメ！　フルネームから住所や学校を調べられることがあるよ！' },
  { text: '⚽　趣味（サッカーや読書など）', safe: true, hint: '⭕ OK！　趣味だけじゃどこにいるかはわからないから大丈夫！' },
  { text: '📞　電話番号', safe: false, hint: '❌ ダメ！　電話番号はとても大切な個人情報！絶対に書かないで！' },
  { text: '🎮　好きなゲームやアニメのタイトル', safe: true, hint: '⭕ OK！　好きな作品は場所や名前がわからないから大丈夫！' },
  { text: '📸　制服を着た自分の写真', safe: false, hint: '❌ ダメ！　制服から学校がバレてしまうことがあるよ！顔写真も注意しよう！' },
  { text: '📍　今いる場所のリアルタイム情報', safe: false, hint: '❌ ダメ！　今どこにいるか知られると、ついてこられるかもしれないよ！' }
];

class QuizGame {
  constructor(questions, settings) {
    this.questions = [...questions];
    this.settings = settings;
    this.currentQ = 0;
    this.score = 0;
    this.isClear = false;

    this.cacheElements();
    this.bindEvents();
  }

  cacheElements() {
    this.els = {
      startScreen: document.getElementById('start-screen'),
      gameScreen: document.getElementById('game-screen'),
      endScreen: document.getElementById('end-screen'),
      card: document.getElementById('card'),
      cardText: document.getElementById('card-text'),
      qNum: document.getElementById('q-num'),
      progressBar: document.getElementById('progress-bar'),
      feedbackText: document.getElementById('feedback-text'),
      feedbackIcon: document.getElementById('feedback-icon'),
      btnOk: document.getElementById('btn-ok'),
      btnNg: document.getElementById('btn-ng'),
      score: document.getElementById('score'),
      endScore: document.getElementById('end-score'),
      endRank: document.getElementById('end-rank'),
      endMsg: document.getElementById('end-msg'),
      startBtn: document.getElementById('start-btn'),
      endBtn: document.getElementById('end-btn')
    };
  }

  bindEvents() {
    // bindを使用し、thisのコンテキストを維持
    this.startQuizHandler = this.startQuiz.bind(this);
    this.answerOkHandler = () => this.answer(true);
    this.answerNgHandler = () => this.answer(false);
    this.finishGameHandler = this.finishGame.bind(this);

    this.els.startBtn.addEventListener('click', this.startQuizHandler);
    this.els.btnOk.addEventListener('click', this.answerOkHandler);
    this.els.btnNg.addEventListener('click', this.answerNgHandler);
    this.els.endBtn.addEventListener('click', this.finishGameHandler);
  }

  startQuiz() {
    // 偏りの少ないフィッシャー・イェーツのシャッフルアルゴリズムを採用
    for (let i = this.questions.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [this.questions[i], this.questions[j]] = [this.questions[j], this.questions[i]];
    }

    this.els.startScreen.classList.add('hidden');
    this.els.gameScreen.classList.remove('hidden');
    this.showQuestion();
  }

  showQuestion() {
    const q = this.questions[this.currentQ];
    this.els.card.className = 'slide-in';
    this.els.cardText.textContent = q.text;
    this.els.qNum.textContent = this.currentQ + 1;
    this.els.progressBar.style.width = (this.currentQ / this.questions.length * 100) + '%';
    this.els.feedbackText.textContent = '← ボタンを押してこたえよう！';
    this.els.feedbackText.className = '';
    this.els.btnOk.disabled = false;
    this.els.btnNg.disabled = false;
  }

  answer(isOk) {
    const q = this.questions[this.currentQ];
    const correct = (isOk === q.safe);

    this.els.btnOk.disabled = true;
    this.els.btnNg.disabled = true;

    if (correct) {
      this.score += this.settings.SCORE_PER_Q;
      this.els.card.className = 'correct';
      this.els.feedbackIcon.textContent = '⭕';
      this.els.feedbackText.textContent = q.hint;
      this.els.feedbackText.className = 'correct-fb';
      this.els.score.textContent = this.score;
    } else {
      this.els.card.className = 'wrong';
      this.els.feedbackIcon.textContent = '❌';
      this.els.feedbackText.textContent = q.hint;
      this.els.feedbackText.className = 'wrong-fb';
    }

    this.els.feedbackIcon.classList.add('show');
    setTimeout(() => this.els.feedbackIcon.classList.remove('show'), this.settings.ICON_SHOW_TIME);

    setTimeout(() => {
      this.currentQ++;
      if (this.currentQ < this.questions.length) {
        this.showQuestion();
      } else {
        this.showEnd();
      }
    }, this.settings.DELAY_NEXT_Q);
  }

  showEnd() {
    this.isClear = this.score >= this.settings.PASSING_SCORE;
    this.els.progressBar.style.width = '100%';
    this.els.gameScreen.classList.add('hidden');
    this.els.endScreen.classList.remove('hidden');
    this.els.endScore.textContent = this.score + ' 点';

    let rank, msg;
    if (this.score >= 100) {
      rank = '🏆 パーフェクト！　個人情報マスター！';
      msg = '全問正解！　すごい！　キミはネットのルールを\nバッチリわかっているよ！　この調子で守り続けてね！';
    } else if (this.score >= 80) {
      rank = '✨ すごい！　ほぼ完璧！';
      msg = 'よくできました！　もう少しで満点だったよ。\nまちがえた問題をもう一度確認してみよう！';
    } else if (this.score >= this.settings.PASSING_SCORE) {
      rank = '🎉 クリア！　合格！';
      msg = 'クリアおめでとう！　ネットのルールをわかってきたね。\nさらに勉強してもっとかしこくなろう！';
    } else if (this.score >= 50) {
      rank = '📖 もう少し！';
      msg = 'もう少しだったよ。個人情報って何か、もう一度\nお父さん・お母さんといっしょに確認してみよう！';
    } else {
      rank = '💪 もっと勉強しよう！';
      msg = 'ネットのルールはとても大切。\nこのゲームをもう一度プレイして、しっかり覚えてね！';
    }

    this.els.endRank.textContent = rank;
    this.els.endMsg.innerHTML = msg.replace(/\n/g, '<br>');
  }

  finishGame() {
    window.parent.postMessage({
      type: 'MINIGAME_END',
      flags: {
        minigame_score: this.score,
        minigame_clear: this.isClear
      }
    }, '*');
    this.destroy(); // 終了時にインスタンスをクリーンアップ
  }

  destroy() {
    // メモリリーク防止のためイベントリスナーを解除
    this.els.startBtn.removeEventListener('click', this.startQuizHandler);
    this.els.btnOk.removeEventListener('click', this.answerOkHandler);
    this.els.btnNg.removeEventListener('click', this.answerNgHandler);
    this.els.endBtn.removeEventListener('click', this.finishGameHandler);
  }
}

// 規約に基づき DOMContentLoaded で安全に初期化
document.addEventListener('DOMContentLoaded', () => {
  window.quizGame = new QuizGame(QUESTIONS, USER_SETTINGS);
});
</script>
</body>
</html>
