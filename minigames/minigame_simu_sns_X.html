<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SNSトラブル回避シミュレーター</title>
  <style>
    /* =========================================================
       CSS リセット & 基本設定 (ダークモードSNS風)
    ========================================================= */
    * {
      box-sizing: border-box;
      user-select: none;
    }
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background-color: #10171e; /* ダーク背景 */
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      overflow: hidden;
      color: #ffffff;
    }

    /* アプリ風コンテナ（スマホサイズを意識） */
    #game-container {
      position: relative;
      width: 100%;
      max-width: 500px;
      height: 100%;
      max-height: 800px;
      background-color: #15202b;
      display: flex;
      flex-direction: column;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
      border-right: 1px solid #38444d;
      border-left: 1px solid #38444d;
      overflow: hidden;
    }

    /* =========================================================
       トップナビゲーション
    ========================================================= */
    .top-nav {
      background-color: rgba(21, 32, 43, 0.95);
      padding: 15px 20px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      border-bottom: 1px solid #38444d;
      font-size: 1.2rem;
      font-weight: bold;
      z-index: 5;
    }
    .status-group {
      display: flex;
      gap: 15px;
      font-size: 1rem;
    }
    .life-icons { color: #e0245e; } /* SNSライクなピンクレッド */
    .score-text { color: #1da1f2; } /* SNSライクなブルー */

    /* =========================================================
       メインタイムラインエリア
    ========================================================= */
    .main-feed {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
      background-color: #15202b;
      padding-bottom: 20px;
    }

    /* 状況説明ラベル */
    .situation-label {
      background-color: #1da1f2;
      color: #fff;
      padding: 8px 15px;
      font-size: 0.9rem;
      font-weight: bold;
      margin: 15px 15px 0 15px;
      border-radius: 4px;
      display: inline-block;
    }

    /* 投稿カード */
    .post-card {
      background-color: #15202b;
      border: 1px solid #38444d;
      margin: 15px;
      border-radius: 12px;
      padding: 15px;
    }

    .post-header {
      display: flex;
      align-items: center;
      margin-bottom: 10px;
    }
    .avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      margin-right: 12px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 1.2rem;
      color: #fff;
      font-weight: bold;
    }
    .user-info {
      display: flex;
      flex-direction: column;
    }
    .user-name {
      font-weight: bold;
      font-size: 1.1rem;
    }
    .user-id {
      color: #8899a6;
      font-size: 0.9rem;
    }

    .post-body {
      font-size: 1.1rem;
      line-height: 1.5;
      white-space: pre-wrap;
      margin-bottom: 15px;
      word-break: break-word;
    }
    .post-link { color: #1da1f2; }
    .post-tag { color: #1da1f2; }

    /* 画像プレースホルダー 
       差し替える場合は background-color を消して background-image を指定 
    */
    .post-image-placeholder {
      width: 100%;
      height: 180px;
      background-color: #2b3b4a;
      border-radius: 12px;
      border: 1px solid #38444d;
      margin-bottom: 15px;
      display: flex;
      justify-content: center;
      align-items: center;
      color: #8899a6;
      font-size: 0.9rem;
    }
    .hidden-image { display: none !important; }

    /* =========================================================
       アクションボタンエリア
    ========================================================= */
    .action-prompt {
      color: #8899a6;
      font-size: 0.95rem;
      margin-bottom: 10px;
      font-weight: bold;
    }
    .action-grid {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }
    .btn-action {
      background-color: transparent;
      color: #fff;
      border: 1px solid #1da1f2;
      border-radius: 9999px; /* ピル型ボタン */
      padding: 12px;
      font-size: 1rem;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .btn-action:hover {
      background-color: rgba(29, 161, 242, 0.1);
    }
    .btn-action:active {
      transform: scale(0.98);
    }

    /* =========================================================
       フィードバックモーダル
    ========================================================= */
    .modal-overlay {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: rgba(0, 0, 0, 0.85);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 10;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }
    .modal-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }
    .modal-content {
      background: #192734;
      width: 90%;
      border-radius: 16px;
      padding: 30px 20px;
      text-align: center;
      border: 1px solid #38444d;
      transform: translateY(20px);
      transition: transform 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }
    .modal-overlay.show .modal-content {
      transform: translateY(0);
    }
    .modal-icon {
      font-size: 4rem;
      margin-bottom: 10px;
    }
    .icon-correct { color: #17bf63; }
    .icon-wrong { color: #e0245e; }
    
    .modal-title {
      font-size: 1.4rem;
      font-weight: bold;
      margin-bottom: 15px;
    }
    .modal-text {
      font-size: 1rem;
      line-height: 1.6;
      color: #fff;
      margin-bottom: 25px;
      text-align: left;
    }
    .btn-next {
      background-color: #1da1f2;
      color: #fff;
      border: none;
      padding: 12px 0;
      width: 100%;
      font-size: 1.1rem;
      border-radius: 9999px;
      cursor: pointer;
      font-weight: bold;
      transition: background 0.2s;
    }
    .btn-next:hover { background-color: #1a91da; }

    /* =========================================================
       各種画面（スタート、リザルト）
    ========================================================= */
    .screen {
      position: absolute;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #15202b;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      z-index: 20;
      padding: 20px;
    }
    .screen h1 {
      font-size: 2.2rem;
      margin-bottom: 20px;
      text-align: center;
      color: #fff;
    }
    .screen p {
      font-size: 1.1rem;
      margin-bottom: 30px;
      text-align: center;
      line-height: 1.6;
      color: #8899a6;
    }
    .btn-primary {
      background-color: #1da1f2;
      color: #fff;
      border: none;
      padding: 15px 40px;
      font-size: 1.2rem;
      border-radius: 9999px;
      cursor: pointer;
      font-weight: bold;
      transition: transform 0.2s, background 0.2s;
    }
    .btn-primary:hover {
      background-color: #1a91da;
      transform: scale(1.05);
    }
    .hidden { display: none !important; }

    /* ダメージエフェクト */
    @keyframes damage-flash {
      0%, 100% { background-color: #15202b; }
      50% { background-color: #6a1329; }
    }
    .damage-bg { animation: damage-flash 0.4s ease-out; }
  </style>
</head>
<body>

  <div id="game-container">
    <!-- UIはJSで構築 -->
  </div>

<script>
  /**

  const USER_SETTINGS = {

    // SNSで遭遇するケースデータ

        avatarInitial: "匿",
        content: "〇〇（有名人）ってマジで性格悪いらしいな。\nあんな奴テレビから消えればいいのに。\nみんなで炎上させようぜｗ",
        hasImage: false,
        imageLabel: "",
        options: [
          {
            text: "便乗して悪口を書き込む・リポストする",
            isCorrect: false,
            feedback: "【不適切・誹謗中傷への加担】\n他人の悪口に便乗して書き込んだり拡散したりすると、あなた自身も名誉毀損や侮辱罪に問われる可能性があります。匿名でも特定される時代です。"
          },
          {
            text: "反応せずにスクロールする（無視する）",
            isCorrect: true,
            feedback: "【適切な対応】\nネガティブな発言や誹謗中傷には関わらないのが一番です。スルーする力（スルースキル）を身につけることが、SNSを安全に楽しむコツです。"

  };

  /**
   * =====================================================================
   * 【ゲームロジック】 SnsLiteracyGame Class
   * =====================================================================
   */
  class SnsLiteracyGame {
    constructor(containerId, settings) {
      this.container = document.getElementById(containerId);
      this.settings = settings;

      // 状態変数
      this.life = settings.MAX_LIFE;
      this.score = 0;
      this.currentCaseIndex = 0;
      this.cases = [];
      this.isGameOver = false;
      this.isClear = false;

      // イベントバインド
      this.boundHandleClick = this.handleClick.bind(this);
    }

    init() {
      this.renderBaseHTML();
      
      this.ui = {
        mainFeed: this.container.querySelector('.main-feed'),
        lifeText: this.container.querySelector('#ui-life'),
        scoreText: this.container.querySelector('#ui-score'),
        situationLabel: this.container.querySelector('#ui-situation'),
        avatar: this.container.querySelector('#ui-avatar'),
        authorName: this.container.querySelector('#ui-author-name'),
        authorId: this.container.querySelector('#ui-author-id'),
        postContent: this.container.querySelector('#ui-post-content'),
        postImage: this.container.querySelector('#ui-post-image'),
        actionGrid: this.container.querySelector('#ui-action-grid'),
        modalOverlay: this.container.querySelector('#ui-modal-overlay'),
        modalIcon: this.container.querySelector('#ui-modal-icon'),
        modalTitle: this.container.querySelector('#ui-modal-title'),
        modalText: this.container.querySelector('#ui-modal-text'),
        startScreen: this.container.querySelector('#screen-start'),
        resultScreen: this.container.querySelector('#screen-result'),
        resultTitle: this.container.querySelector('#result-title'),
        resultMessage: this.container.querySelector('#result-message')
      };

      this.container.addEventListener('click', this.boundHandleClick);
    }

    renderBaseHTML() {
      this.container.innerHTML = `
        <!-- トップナビゲーション -->
        <div class="top-nav">
          <div>SocialNet</div>
          <div class="status-group">
            <div class="score-text">Score: <span id="ui-score">0</span></div>
            <div id="ui-life" class="life-icons"></div>
          </div>
        </div>

        <!-- タイムラインエリア -->
        <div class="main-feed">
          <div id="ui-situation" class="situation-label"></div>
          
          <div class="post-card">
            <div class="post-header">
              <div id="ui-avatar" class="avatar"></div>
              <div class="user-info">
                <span id="ui-author-name" class="user-name"></span>
                <span id="ui-author-id" class="user-id"></span>
              </div>
            </div>
            
            <div id="ui-post-content" class="post-body"></div>
            
            <div id="ui-post-image" class="post-image-placeholder"></div>

            <div class="action-prompt">あなたの行動を選択：</div>
            <div id="ui-action-grid" class="action-grid"></div>
          </div>
        </div>

        <!-- フィードバックモーダル -->
        <div id="ui-modal-overlay" class="modal-overlay">
          <div class="modal-content">
            <div id="ui-modal-icon" class="modal-icon"></div>
            <div id="ui-modal-title" class="modal-title"></div>
            <div id="ui-modal-text" class="modal-text"></div>
            <button class="btn-next" data-action="next-case">次へ進む</button>
          </div>
        </div>

        <!-- スタート画面 -->
        <div id="screen-start" class="screen">
          <h1>SNSトラブル回避<br>シミュレーター</h1>
          <p>タイムラインやDMに流れてくる情報に対し、情報リテラシーに基づいた正しい行動を選択してください。<br>間違った行動をとるとライフ（❤️）が減ります。</p>
          <button class="btn-primary" data-action="start">アプリを開く</button>
        </div>

        <!-- リザルト画面 -->
        <div id="screen-result" class="screen hidden">
          <h1 id="result-title"></h1>
          <p id="result-message"></p>
          <button class="btn-primary" data-action="finish">アプリを閉じる</button>
        </div>
      `;
    }

    handleClick(e) {
      const action = e.target.getAttribute('data-action');
      
      if (action === 'start') {
        this.startGame();
      } else if (action === 'finish') {
        this.finishGame();
      } else if (action === 'next-case') {
        this.goToNextCase();
      } else if (action === 'choose-option') {
        const index = parseInt(e.target.getAttribute('data-index'), 10);
        this.handleOption(index);
      }
    }

    startGame() {
      this.ui.startScreen.classList.add('hidden');
      this.cases = [...this.settings.CASES];
      this.currentCaseIndex = 0;
      this.score = 0;
      this.life = this.settings.MAX_LIFE;
      
      this.updateStatusUI();
      this.loadCase();
    }

    updateStatusUI() {
      this.ui.scoreText.textContent = this.score;
      this.ui.lifeText.textContent = '❤️'.repeat(this.life) + '🖤'.repeat(this.settings.MAX_LIFE - this.life);
    }

    loadCase() {
      const currentData = this.cases[this.currentCaseIndex];

      this.ui.situationLabel.textContent = currentData.situation;
      
      this.ui.avatar.style.backgroundColor = currentData.avatarColor;
      this.ui.avatar.textContent = currentData.avatarInitial;
      
      this.ui.authorName.textContent = currentData.authorName;
      this.ui.authorId.textContent = currentData.authorId;
      
      // HTMLタグを許可して表示（ハッシュタグやリンクの色付け用）
      this.ui.postContent.innerHTML = currentData.content.replace(/\n/g, '<br>');

      // 画像プレースホルダーの表示切り替え
      if (currentData.hasImage) {
        this.ui.postImage.classList.remove('hidden-image');
        this.ui.postImage.textContent = currentData.imageLabel;
      } else {
        this.ui.postImage.classList.add('hidden-image');
      }

      // 選択肢の生成
      this.ui.actionGrid.innerHTML = '';
      currentData.options.forEach((opt, index) => {
        const btn = document.createElement('button');
        btn.className = 'btn-action';
        btn.textContent = opt.text;
        btn.setAttribute('data-action', 'choose-option');
        btn.setAttribute('data-index', index);
        this.ui.actionGrid.appendChild(btn);
      });
      
      // スクロールを上に戻す
      this.ui.mainFeed.scrollTop = 0;
    }

    handleOption(optionIndex) {
      const currentData = this.cases[this.currentCaseIndex];
      const selectedOption = currentData.options[optionIndex];

      if (selectedOption.isCorrect) {
        // 正解
        this.score += this.settings.SCORE_PER_CORRECT;
        this.showModal(true, "素晴らしい判断です！", selectedOption.feedback);
      } else {
        // 不正解
        this.life--;
        this.playDamageAnim();
        this.showModal(false, "トラブル発生！", selectedOption.feedback);
      }

      this.updateStatusUI();
    }

    showModal(isCorrect, title, text) {
      this.ui.modalIcon.className = `modal-icon ${isCorrect ? 'icon-correct' : 'icon-wrong'}`;
      this.ui.modalIcon.textContent = isCorrect ? '✅' : '❌';
      
      this.ui.modalTitle.textContent = title;
      this.ui.modalTitle.style.color = isCorrect ? '#17bf63' : '#e0245e';
      
      this.ui.modalText.innerHTML = text.replace(/\n/g, '<br>');
      
      this.ui.modalOverlay.classList.add('show');
    }

    playDamageAnim() {
      this.ui.mainFeed.classList.add('damage-bg');
      setTimeout(() => {
        this.ui.mainFeed.classList.remove('damage-bg');
      }, 400);
    }

    goToNextCase() {
      this.ui.modalOverlay.classList.remove('show');

      if (this.life <= 0) {
        this.endGame(false, "トラブルに巻き込まれ、SNSアカウントが炎上（または乗っ取り）してしまいました。情報の発信・受信には十分注意しましょう。");
        return;
      }

      this.currentCaseIndex++;

      if (this.currentCaseIndex >= this.cases.length) {
        this.endGame(true, "すべてのシチュエーションで適切な判断ができました！これからも安全にSNSを利用しましょう。");
      } else {
        this.loadCase();
      }
    }

    endGame(isClear, reasonMsg) {
      this.isClear = isClear;
      this.isGameOver = true;

      // ライフボーナス
      if (isClear) {
        this.score += (this.life * this.settings.SCORE_PER_LIFE);
      }

      setTimeout(() => {
        this.ui.resultTitle.textContent = isClear ? "ALL CLEAR!" : "ACCOUNT SUSPENDED";
        this.ui.resultTitle.style.color = isClear ? "#17bf63" : "#e0245e";
        
        this.ui.resultMessage.innerHTML = `
          ${reasonMsg}<br><br>
          最終リテラシースコア: ${this.score}
        `;
        
        this.ui.resultScreen.classList.remove('hidden');
      }, 300);
    }

    /**
     * 【必須要件】 親ウィンドウへ結果を送信し、インスタンスを破棄する
     */
    finishGame() {
      window.parent.postMessage({
        type: 'MINIGAME_END',
        flags: {
          minigame_score: this.score,
          minigame_clear: this.isClear
        }
      }, '*');

      this.destroy();
    }

    destroy() {
      this.container.removeEventListener('click', this.boundHandleClick);
      this.container.innerHTML = '';
      console.log("SnsLiteracyGame instance destroyed safely.");
    }
  }

  /**
   * =====================================================================
   * DOM読み込み完了後にゲームを初期化
   * =====================================================================
   */
  document.addEventListener('DOMContentLoaded', () => {
    const game = new SnsLiteracyGame('game-container', USER_SETTINGS);
    game.init();
  });
</script>
</body>
